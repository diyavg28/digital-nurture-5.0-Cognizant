<h2>Course List</h2>

<input
  type="text"
  placeholder="Search courses"
  [(ngModel)]="searchTerm">

<p *ngIf="loading">Loading...</p>

<div *ngFor="let course of filteredCourses">
  <app-course-card
    [name]="course.title"
    [code]="course.id"
    [credits]="course.userId"
    [grade]="'A'">
  </app-course-card>
</div>

<p *ngIf="!loading && filteredCourses.length === 0">
  No courses found.
</p>
